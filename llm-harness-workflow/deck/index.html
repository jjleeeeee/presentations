<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI(LLM)의 이해부터 하네스까지</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#000; --surface-2:#161616; --surface-3:#1F1F1F; --surface-4:#282828;
  --text:#fff; --gray-600:#999; --gray-500:#777; --accent:#01D5DF;
  --negative:#FE5B58; --border:#282828; --outline:rgba(255,255,255,.05);
  --r-lg:16px; --r-md:8px; --r-sm:4px;
}
html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
body {
  font-family:'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  color:var(--text); -webkit-font-smoothing:antialiased;
}
.deck-wrapper { position:absolute; width:1920px; height:1080px; transform-origin:top left; overflow:hidden; }
.slide {
  position:absolute; inset:0; padding:100px 80px; background:var(--bg);
  display:flex; flex-direction:column; gap:24px; overflow:hidden;
  opacity:0; pointer-events:none; transition:opacity .22s ease;
}
.slide.active { opacity:1; pointer-events:auto; }
.slide::after {
  content:attr(data-count); position:absolute; right:80px; bottom:100px;
  font-size:20px; color:var(--gray-500); font-weight:500;
}
.slide[data-hide-counter]::after { display:none; }
.eyebrow { font-size:20px; font-weight:800; color:var(--accent); letter-spacing:.08em; text-transform:uppercase; }
.title { font-size:48px; font-weight:800; line-height:1.2; letter-spacing:-.96px; max-width:1220px; }
.sub { font-size:24px; line-height:1.6; color:var(--gray-600); max-width:960px; }
.content { flex:1; display:flex; flex-direction:column; justify-content:center; gap:40px; margin-top:56px; }
.accent { color:var(--accent); }

.slide--cover { justify-content:center; gap:30px; background:#D5F3F1; }
.slide--cover::before {
  content:''; position:absolute; inset:0;
  background:url('../../style-kit/assets/background/figma-cover-gradient.svg') center/cover no-repeat;
  z-index:0;
}
.cover-title, .cover-sub, .cover-meta, .cover-logo { position:relative; z-index:1; }
.cover-title { color:#000; font-size:80px; line-height:1.15; letter-spacing:-1.6px; font-weight:800; max-width:1180px; }
.cover-sub { color:#000; font-size:36px; line-height:1.32; font-weight:700; letter-spacing:-.72px; }
.cover-meta { color:rgba(0,0,0,.65); font-size:20px; line-height:1.6; margin-top:auto; }
.cover-logo {
  position:absolute; right:80px; bottom:100px; width:142px; height:20px;
  mix-blend-mode:overlay; pointer-events:none;
}

.slide--toc { flex-direction:row; padding:0; }
.toc-left { width:50%; padding:100px 60px 100px 80px; display:flex; flex-direction:column; gap:24px; }
.toc-right { width:50%; padding:100px 80px 100px 60px; display:grid; grid-template-columns:1fr 1fr; gap:40px; align-content:center; }
.toc-item { display:flex; gap:16px; align-items:baseline; margin-bottom:15px; }
.toc-item .n, .toc-item .t { font-size:24px; line-height:1.45; font-weight:700; }
.toc-item .n { width:32px; color:var(--accent); }
.toc-item .t { color:var(--text); font-weight:500; }

.chapter-slide { justify-content:center; }
.chapter-kicker { font-size:24px; color:var(--accent); font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
.chapter-title { font-size:72px; line-height:1.12; letter-spacing:-1.44px; font-weight:800; max-width:1320px; }
.chapter-line { width:160px; height:2px; background:var(--accent); margin-top:20px; }

.scene-grid { flex:1; display:grid; grid-template-columns: .9fr 1.1fr; gap:80px; align-items:center; margin-top:36px; }
.message { font-size:72px; line-height:1.14; letter-spacing:-1.44px; font-weight:800; max-width:760px; }
.caption { margin-top:40px; font-size:28px; line-height:1.55; color:var(--gray-600); max-width:760px; }
.visual-stage {
  min-height:620px; border:1px solid var(--border); border-radius:var(--r-lg);
  background:var(--surface-2); padding:44px; position:relative; overflow:hidden;
  display:flex; flex-direction:column; justify-content:center; gap:28px;
}
.visual-stage::before {
  content:''; position:absolute; inset:44px; border:1px solid var(--outline);
  border-radius:var(--r-md); pointer-events:none;
}
.visual-stage.has-image {
  padding:0;
  border-color:rgba(255,255,255,.12);
}
.visual-stage.has-image::before {
  content:''; inset:0; border:0; border-radius:var(--r-lg);
  background:linear-gradient(90deg, rgba(0,0,0,.18), rgba(0,0,0,0) 42%, rgba(0,0,0,.28));
  z-index:1;
}
.visual-image {
  position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  filter:saturate(.86) contrast(1.06) brightness(.82);
}
.visual-stage.has-image .visual-title {
  position:absolute; left:36px; right:36px; bottom:32px; z-index:2;
  color:rgba(255,255,255,.74); text-shadow:0 2px 12px rgba(0,0,0,.55);
}
.visual-title { position:relative; z-index:1; font-size:24px; color:var(--gray-600); line-height:1.5; }
.keyword-row { position:relative; z-index:1; display:flex; flex-wrap:wrap; gap:14px; }
.chip {
  font-size:24px; line-height:1; font-weight:700; color:var(--text);
  border:1px solid rgba(255,255,255,.16); border-radius:999px; padding:14px 22px;
  background:var(--surface-3);
}
.chip.accent-chip { background:var(--accent); color:#000; border-color:var(--accent); }
.diagram { position:relative; z-index:1; height:260px; display:flex; align-items:center; justify-content:center; gap:22px; }
.node {
  min-width:150px; min-height:92px; padding:18px 22px; border-radius:var(--r-md);
  border:1px solid rgba(255,255,255,.22); background:var(--surface-3);
  display:flex; align-items:center; justify-content:center; text-align:center;
  font-size:22px; line-height:1.35; font-weight:700;
}
.node.accent-node { border:2px solid var(--accent); color:var(--accent); }
.arrow { font-size:28px; color:var(--gray-600); font-weight:700; }
.quote-mark { position:absolute; right:44px; top:28px; font-size:160px; color:rgba(255,255,255,.04); font-weight:800; line-height:1; }
.horse-line {
  position:relative; z-index:1; width:520px; height:220px; margin:0 auto;
  border-bottom:2px solid var(--accent); border-radius:50%;
}
.horse-line::before, .horse-line::after {
  content:''; position:absolute; border:2px solid var(--text); border-radius:50%;
}
.horse-line::before { width:300px; height:126px; left:86px; top:54px; border-left-color:transparent; border-bottom-color:transparent; transform:rotate(-8deg); }
.horse-line::after { width:78px; height:78px; right:96px; top:28px; border-left-color:transparent; transform:rotate(22deg); }
.bars { position:relative; z-index:1; display:flex; flex-direction:column; gap:18px; }
.bar { display:grid; grid-template-columns:150px 1fr; gap:20px; align-items:center; font-size:22px; color:var(--gray-600); }
.track { height:32px; border-radius:999px; background:var(--surface-4); overflow:hidden; }
.fill { height:100%; border-radius:999px; background:var(--accent); }
.split-list { position:relative; z-index:1; display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.mini-card { border:1px solid rgba(255,255,255,.16); border-radius:var(--r-md); padding:24px; min-height:128px; background:var(--surface-3); }
.mini-card strong { display:block; font-size:24px; margin-bottom:12px; }
.mini-card span { display:block; font-size:20px; color:var(--gray-600); line-height:1.5; }

.slide--closing { align-items:center; justify-content:center; text-align:center; }
.slide--closing .message { max-width:1180px; font-size:72px; }
.slide--closing .caption { max-width:820px; }
.progress {
  position:fixed; left:0; top:0; height:3px; width:0; background:var(--accent);
  z-index:20; transition:width .2s ease;
}
.hint {
  position:fixed; left:24px; bottom:20px; z-index:20; color:rgba(255,255,255,.28);
  font-size:14px; letter-spacing:.04em;
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration:.01ms !important; animation-duration:.01ms !important; }
}
</style>
</head>

<div class="progress" id="progress"></div>
<div class="hint">← → / Space</div>
<main class="deck-wrapper" id="deck">
  <section class="slide slide--cover active" data-hide-counter>
    <h1 class="cover-title">AI(LLM)의 이해부터<br>하네스까지</h1>
    <p class="cover-sub">나만의 워크플로우 만들기</p>
    <p class="cover-meta">LLM to Harness Workflow</p>

    <div class="toc-right" id="toc"></div>
  </section>
</main>

  { chapter:8, msg:'지금은 오히려<br>방해가 되기도 합니다.', visual:'과하게 묶인 말 장비', cap:'과한 제약은 모델 능력을 막을 수 있습니다.', chips:['Overfit rules','Too much context','Less agency'] },
  { chapter:8, msg:'이제는 얼마나<br>덜 방해할 것인가', visual:'가볍고 단순해진 구조', cap:'Harness도 함께 진화합니다.', chips:['Light','Clear','Flexible'], accent:'Light' },
  { chapter:9, msg:'정보를 전부<br>쫓아가지 마세요.', visual:'쏟아지는 AI 뉴스와 정보', cap:'모든 정보를 따라갈 필요는 없습니다.', image:'../assets/generated/info-overload.png' },
  { chapter:9, msg:'중요한 건 무엇을<br>만들고 싶은가입니다.', visual:'빈 캔버스 앞의 디자이너', cap:'필요한 정보는 결과물에서 시작됩니다.', chips:['Make','Need','Learn'], accent:'Make' },
  { chapter:9, msg:'Superpowers<br>Brainstorming', visual:'아이디어 확장 이미지', cap:'처음 시작하기 좋은 brainstorming workflow.', chips:['Intent','Question','Options','Design'] },
  { chapter:9, msg:'Grill Me', visual:'질문을 던지는 인터뷰 구조', cap:'생각을 깊게 만드는 질문 기반 workflow.', chips:['Why?','What if?','Evidence?','Tradeoff?'] },
  { chapter:9, msg:'Caveman', visual:'단순화되는 토큰 구조', cap:'토큰 사용량을 줄이고 context를 정리합니다.', chips:['Short','Dense','Useful'] },
  { chapter:9, msg:'우선 뭐든<br>만들어보세요.', visual:'다시 달리기 시작하는 말', cap:'결과를 만들다 보면 workflow는 자연스럽게 자라납니다.', image:'../assets/generated/wild-horse.png' },
  { chapter:9, msg:'야생마는 자신의 몸에 맞는<br>마구를 착용하게 됩니다.', visual:'몸에 맞는 장비를 착용한 말, 안정적으로 달리는 장면', cap:'좋은 Harness는 반복된 작업 속에서 자연스럽게 만들어집니다.', image:'../assets/generated/wild-horse.png' },
  { chapter:9, msg:'감사합니다.', visual:'초원을 달려나가는 말의 뒷모습', cap:'AI와 함께 자신만의 workflow를 만들어보세요.', closing:true }
];

const deck = document.getElementById('deck');
const toc = document.getElementById('toc');

chapters.forEach((title, i) => {
  const item = document.createElement('div');
  item.className = 'toc-item';
  item.innerHTML = `<span class="n">${String(i + 1).padStart(2, '0')}</span><span class="t">${title}</span>`;
  toc.appendChild(item);
});

function visualHTML(s) {
  if (s.image) return `<img class="visual-image" src="${s.image}" alt=""><p class="visual-title">${s.visual}</p>`;
  if (s.horse) return `<div class="quote-mark">“</div><div class="horse-line"></div><p class="visual-title">${s.visual}</p>`;
  if (s.flow) return `<div class="diagram">${s.flow.map((x,i)=>`<div class="node ${i===s.flow.length-1?'accent-node':''}">${x}</div>${i<s.flow.length-1?'<div class="arrow">→</div>':''}`).join('')}</div><p class="visual-title">${s.visual}</p>`;
  if (s.bars) return `<div class="bars">${s.bars.map(([name,val])=>`<div class="bar"><span>${name}</span><div class="track"><div class="fill" style="width:${val}%"></div></div></div>`).join('')}</div><p class="visual-title">${s.visual}</p>`;
  if (s.split) return `<div class="split-list">${s.split.map(([a,b])=>`<div class="mini-card"><strong>${a}</strong><span>${b}</span></div>`).join('')}</div><p class="visual-title">${s.visual}</p>`;
  const chips = s.chips || [];
  return `<div class="keyword-row">${chips.map(x=>`<span class="chip ${x===s.accent?'accent-chip':''}">${x}</span>`).join('')}</div><p class="visual-title">${s.visual}</p>`;
}

let lastChapter = 0;
slides.forEach((s) => {
  if (s.chapter !== lastChapter) {
    const chapter = document.createElement('section');
    chapter.className = 'slide chapter-slide';
    chapter.innerHTML = `<div class="chapter-kicker">Chapter ${String(s.chapter).padStart(2,'0')}</div><h2 class="chapter-title">${chapters[s.chapter - 1]}</h2><div class="chapter-line"></div>`;
    deck.appendChild(chapter);
    lastChapter = s.chapter;
  }

  const section = document.createElement('section');
  section.className = s.closing ? 'slide slide--closing' : 'slide';
  section.innerHTML = s.closing
    ? `<h2 class="message">${s.msg}</h2><p class="caption">${s.cap}</p>`
    : `<div class="eyebrow">Slide ${String(slides.indexOf(s) + 1).padStart(2, '0')}</div><div class="scene-grid"><div><h2 class="message">${s.msg}</h2><p class="caption">${s.cap}</p></div><div class="visual-stage ${s.image ? 'has-image' : ''}">${visualHTML(s)}</div></div>`;
  deck.appendChild(section);
});

const allSlides = [...document.querySelectorAll('.slide')];
let current = 0;

function setCounters() {
  const total = allSlides.length;
  allSlides.forEach((slide, i) => {
    if (!slide.hasAttribute('data-hide-counter')) {
      slide.dataset.count = `${String(i + 1).padStart(2, '0')} / ${String(total).padStart(2, '0')}`;
    }
  });
}

function resizeDeck() {
  const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
  deck.style.transform = `scale(${scale})`;
  deck.style.left = `${(window.innerWidth - 1920 * scale) / 2}px`;
  deck.style.top = `${(window.innerHeight - 1080 * scale) / 2}px`;
}

function go(index) {
  current = Math.max(0, Math.min(index, allSlides.length - 1));
  allSlides.forEach((slide, i) => slide.classList.toggle('active', i === current));
  document.getElementById('progress').style.width = `${((current + 1) / allSlides.length) * 100}%`;
  history.replaceState(null, '', `#${current + 1}`);
}

function next() { go(current + 1); }
function prev() { go(current - 1); }

window.addEventListener('resize', resizeDeck);
document.addEventListener('keydown', (e) => {
  if (['ArrowRight','ArrowDown',' ','PageDown','Enter'].includes(e.key)) { e.preventDefault(); next(); }
  if (['ArrowLeft','ArrowUp','PageUp','Backspace'].includes(e.key)) { e.preventDefault(); prev(); }
});
document.addEventListener('click', next);

let startX = 0;
document.addEventListener('touchstart', (e) => { startX = e.changedTouches[0].clientX; }, { passive:true });
document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - startX;
  if (Math.abs(dx) > 40) dx < 0 ? next() : prev();
}, { passive:true });

setCounters();
resizeDeck();
const initial = Number(location.hash.replace('#',''));
go(Number.isFinite(initial) && initial > 0 ? initial - 1 : 0);
</script>
