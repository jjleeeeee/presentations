<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LLM Harness Workflow Scene Drafts</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050505;
      --fg: #f5f5f5;
      --muted: #8a8a8a;
      --line: #202020;
      --accent: #15dbe8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", sans-serif;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 18px 18px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(5, 5, 5, .86);
      backdrop-filter: blur(18px);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    main {
      display: grid;
      gap: 28px;
      padding: 20px 12px 40px;
    }

    figure {
      margin: 0;
      border-bottom: 1px solid var(--line);
      padding-bottom: 28px;
    }

    figcaption {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 6px 10px;
      font-size: 13px;
      color: var(--muted);
    }

    figcaption strong {
      color: var(--accent);
      font-size: 14px;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
      background: #000;
    }

    @media (min-width: 900px) {
      main {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        padding: 28px;
      }

      figure {
        border-bottom: 0;
        padding-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>LLM Harness Workflow Scene Drafts</h1>
    <p>Slide 09-37 이미지 시안. 모바일에서는 세로 스크롤로 확인.</p>
  </header>
  <main>
    <script>
      const main = document.currentScript.parentElement;
      for (let i = 9; i <= 34; i += 1) {
        const num = String(i).padStart(2, '0');
        const figure = document.createElement('figure');
        figure.innerHTML = `
          <figcaption><strong>Slide ${num}</strong><span>scene draft</span></figcaption>
          <img src="./slide-${num}.png" alt="Slide ${num} scene draft" loading="lazy">
        `;
        main.appendChild(figure);
      }
    </script>
  </main>
</body>
</html>
