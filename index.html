<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentations</title>
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --muted: #999;
      --line: #282828;
      --accent: #01D5DF;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(960px, calc(100vw - 48px));
      margin: 0 auto;
      padding: 96px 0;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 56px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .intro {
      margin: 0 0 64px;
      color: var(--muted);
      font-size: 20px;
      line-height: 1.6;
    }

    .list {
      display: grid;
      gap: 16px;
    }

    a {
      display: grid;
      grid-template-columns: 72px 1fr auto;
      gap: 24px;
      align-items: center;
      min-height: 112px;
      padding: 28px 32px;
      color: inherit;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #111;
    }

    a:hover {
      border-color: var(--accent);
    }

    .order {
      color: var(--accent);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .title {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.25;
    }

    .path {
      color: var(--muted);
      font-size: 16px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Presentations</h1>
    <p class="intro">Published decks, ordered by creation sequence. URLs use readable slugs.</p>

    <section class="list" aria-label="Presentation list">
      <a href="ai-persona/">
        <span class="order">01</span>
        <span class="title">AI Persona</span>
        <span class="path">ai-persona</span>
      </a>

      <a href="llm-harness-workflow/">
        <span class="order">02</span>
        <span class="title">LLM to Harness Workflow</span>
        <span class="path">llm-harness-workflow</span>
      </a>
    </section>
  </main>
</body>
</html>
